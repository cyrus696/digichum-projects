<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up</title>
    <link rel="stylesheet" href="/Sources/Css/SignUp.css">
</head>
<body>
    <section class="signup-container">

  <!-- LEFT SIDE -->
  <div class="signup-left">
    <h1>Dwello Homes</h1>
  </div>

  <!-- RIGHT SIDE -->
  <div class="signup-right">
    <form class="signup-form">
      <h2 style="color: rgb(255, 255, 255);">Create Account</h2>

      <input type="text" placeholder="Full Name" required />
      <input type="email" placeholder="Email Address" required />
      <input type="tel" placeholder="Phone Number" required />

      <input type="password" placeholder="Password" required />
      <input type="password" placeholder="Confirm Password" required />

      <div class="terms">
        <input type="checkbox" id="terms" required />
        <label for="terms">I agree to the Terms & Privacy Policy</label>
      </div>
      

      <button type="submit">Create Account</button>

      <p style="color: white;" class="login-link">
        Already have an account? <a style="color: rgb(86, 86, 251);" href="/Sources/html/login.html">Login</a>
      </p>
    </form>
  </div>

</section>

</body>
</html>
